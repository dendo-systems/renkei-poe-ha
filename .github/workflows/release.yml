name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          cd custom_components/renkei_poe
          zip -r ../../renkei_poe.zip .

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: renkei_poe.zip
